name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure git
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"
      - name: Run tests
        run: bash tests/run_all.sh
